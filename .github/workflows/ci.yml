name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      # ── All Actions are pinned by commit SHA (to prevent supply-chain attacks via tag retag).
      # Same versions as release.yml (v4 series is Node.js 20-based and scheduled for removal
      # from runners on 2026-09-16, so we have upgraded to the v6 series based on Node.js 24).
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up pnpm
        # pnpm/action-setup@v6.0.8 — version is taken from packageManager in package.json
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Set up Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run type check
        run: pnpm run check-types

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test
