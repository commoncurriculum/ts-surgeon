name: Release Package

# Triggered by a tag push in vX.Y.Z format (no leading zeros, no prerelease, no build metadata).
# The Git tag is the single source of truth for the version. package.json and src/version.ts
# are pinned at 0.0.0-development; this workflow bakes the value from the tag.
#
# Prerelease tags (e.g. v1.2.0-rc.1) are intentionally unsupported. To add support:
# (1) update the glob here, (2) update STRICT_SEMVER in scripts/release-version.mjs,
# (3) update SKILL.md / README together.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Prevent duplicate runs for the same tag. Newer pushes take priority.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # Required for npm Trusted Publishing (OIDC) and provenance.
      # Replaces NPM_TOKEN with a short-lived OIDC ID Token for publishing; this is the sole authorization asset.
      id-token: write
    timeout-minutes: 15
    steps:
      # ── All Actions are pinned by commit SHA (to prevent supply-chain attacks via tag retag) ──
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        # pnpm/action-setup@v6.0.8 — version is taken from packageManager in package.json
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Setup Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Trusted Publishing requires Node 22.14+, so we override on CI only.
          # The volta field in package.json (Node 20.x) is preserved for local development.
          # registry-url is intentionally omitted: when setup-node interprets registry-url
          # it writes `_authToken=${NODE_AUTH_TOKEN}` to ~/.npmrc, causing an auth attempt
          # via the empty-token path instead of OIDC → 404 (the main cause of failures before the fix).
          node-version: '22'
          cache: pnpm

      - name: Upgrade npm to >= 11.5.1 for trusted publishing
        # Trusted Publishing became generally available in npm CLI 11.5.1.
        # Since pnpm publish uses npm CLI internally, we upgrade npm itself to the latest version.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: get_version
        # Complies with SemVer 2.0.0 §2 (no leading zeros). Prerelease and build metadata are not allowed.
        # Same pattern as STRICT_SEMVER in scripts/release-version.mjs.
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Error: Tag version ($VERSION) is not a strict SemVer X.Y.Z (no leading zeros, no prerelease, no build metadata)."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Why tests run before baking:
      # - Tests are written assuming the placeholder version (0.0.0-development).
      # - This prevents every release from failing with the baked value if snapshot tests
      #   for serverInfo.version are added in the future (protection against the snapshot trap).
      - name: Test package (before bake — uses placeholder VERSION)
        run: pnpm run test

      # Bake the tag value into src/version.ts and package.json.
      # See the top-level comment in scripts/release-version.mjs for why this is done via a node script.
      # Short version: sed / jq are fragile against formatter rules and no-ops tend to be silent.
      - name: Bake VERSION from tag
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/release-version.mjs --bake "$VERSION"
          echo "--- src/version.ts ---"
          cat src/version.ts
          echo "--- package.json (version) ---"
          node -e 'process.stdout.write(JSON.parse(require("node:fs").readFileSync("package.json","utf8")).version + "\n")'

      - name: Build package (with baked VERSION)
        run: pnpm run build

      # Confirm that the baked version is present in dist with an exact match (drift detection).
      # grep uses -F (fixed string) with the full assignment line to prevent unrelated substring matches.
      - name: Verify baked version landed in dist
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail
          expected="exports.VERSION = \"${VERSION}\";"
          if ! grep -qF "$expected" dist/version.js; then
            echo "Error: dist/version.js does not contain the exact line:"
            echo "  $expected"
            echo "--- dist/version.js ---"
            cat dist/version.js
            exit 1
          fi
          echo "dist/version.js contains the expected line: $expected"

      # Remove the internal-only _version_note before publishing (to avoid exposing
      # internal skill paths on the npm registry). `pnpm pkg` is not yet implemented
      # in pnpm v11 (ERR_PNPM_NOT_IMPLEMENTED), so we call npm CLI's `npm pkg` directly.
      # Rewrites package.json in place.
      - name: Strip internal _version_note before publish
        run: npm pkg delete _version_note

      - name: Publish to npm (pnpm + Trusted Publishing via OIDC)
        # Publish via pnpm to unify the supply-chain attack surface.
        # pnpm 11+'s native publish implementation uses npm CLI 11.5+'s OIDC path internally.
        # --no-git-checks: skip Git state checks in CI
        # --provenance: issue provenance attestation via GitHub Actions OIDC + Sigstore
        # --access public: publish the scoped package publicly
        #
        # NOTE: package.json scripts.prepublishOnly reruns `pnpm run build`, which
        # re-executes tsc and regenerates dist. This re-reads src/version.ts after baking,
        # so the result is identical, but the build the Verify step inspected and the build
        # actually published are strictly different artifacts (build #1 vs #2). This is fine
        # while the bake mechanism is a disk mutation, but if baking is changed to a different
        # approach (e.g., a transformer) in the future, revisit prepublishOnly behavior as well.
        run: pnpm publish --no-git-checks --provenance --access public
