name: Release Package

# Changesets-driven releases (https://changesets.dev):
# - Every feature PR includes a .changeset/*.md describing its bump (pnpm changeset).
# - On each push to main, changesets/action either
#     (a) opens/updates the "Version Packages" PR that applies pending changesets
#         (bumps package.json, writes CHANGELOG.md), or
#     (b) when main has no pending changesets but package.json is ahead of npm
#         (i.e. the Version Packages PR was just merged), publishes to npm and
#         pushes the vX.Y.Z git tag.
# - Merging the Version Packages PR IS the release. No manual tagging.
#
# npm auth is Trusted Publishing (OIDC). The npm trusted publisher config pins
# this workflow's filename — keep it release.yml.
on:
  push:
    branches: [main]

# One release run at a time; never cancel a publish in flight.
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # changesets/action pushes the version commit + git tags and opens the
      # Version Packages PR; OIDC id-token is the sole npm publish credential.
      contents: write
      pull-requests: write
      id-token: write
    timeout-minutes: 15
    steps:
      # ── All Actions are pinned by commit SHA (to prevent supply-chain attacks via tag retag) ──
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        # pnpm/action-setup@v6.0.8 — version is taken from packageManager in package.json
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Setup Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Trusted Publishing requires Node 22.14+, so we override on CI only.
          # registry-url is intentionally omitted: when setup-node interprets registry-url
          # it writes `_authToken=${NODE_AUTH_TOKEN}` to ~/.npmrc, causing an auth attempt
          # via the empty-token path instead of OIDC → 404 (the main cause of failures before the fix).
          node-version: '22'
          cache: pnpm

      - name: Upgrade npm to >= 11.5.1 for trusted publishing
        # Trusted Publishing became generally available in npm CLI 11.5.1.
        # `changeset publish` shells out to npm publish, which uses the OIDC path.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test package
        run: pnpm run test

      - name: Create Version Packages PR or publish to npm
        # changesets/action@v1.9.0
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d
        with:
          # `pnpm run release` = pnpm run build && changeset publish.
          # changeset publish reads access from .changeset/config.json ("public")
          # and creates + pushes the vX.Y.Z tag on success.
          publish: pnpm run release
          title: "chore: version package"
          commit: "chore: version package"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Provenance attestation via GitHub Actions OIDC + Sigstore.
          NPM_CONFIG_PROVENANCE: "true"
