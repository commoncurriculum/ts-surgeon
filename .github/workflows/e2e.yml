name: E2E

# Heavy E2E that clones real repositories (hono / zustand) and applies all MCP tools.
# Not included in per-PR blocking CI; runs on a nightly schedule and manual dispatch.
# - Long runtime (clone + dependency install + type check / tests for each repo)
# - Depends on bun / pnpm / network availability
# To prevent silent skips (where missing bun or a clone failure makes "all skip = green"),
# E2E_REQUIRE_PREPARED=1 causes preparation failures to hard-fail instead.
on:
  schedule:
    # Daily at 12:00 JST (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── All Actions are pinned by commit SHA (to prevent supply-chain attacks via tag retag).
      # Keep versions in sync with ci.yml / release.yml.
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up pnpm
        # pnpm/action-setup@v6.0.8 — version is taken from packageManager in package.json
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Set up Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Set up Bun
        # oven-sh/setup-bun@v2.2.0 — required for installing hono's dependencies
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        run: pnpm install

      - name: Run E2E
        # Treat preparation failures (clone/install/baseline) as hard failures instead of skips
        env:
          E2E_REQUIRE_PREPARED: '1'
        run: pnpm run test:e2e
